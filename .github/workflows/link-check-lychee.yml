name: Check for Broken Links

on:
  workflow_dispatch:
  schedule:
    - cron: '7 3 * * 7'

permissions:
  issues: read

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for broken links, exclude some false positive paths
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --accept '200, 302, 401..=403' . --exclude-path '_includes/footer.html' --exclude-path 'index.md' --exclude-path '_posts/2021-05-07-library-seminars.md' --exclude-path '_posts/2021-11-08-MRIP-seminars.md' --verbose
          fail: true
      